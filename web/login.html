<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Ayman El-Toufaili</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --card: #1a1f2a;
  --card2: #141920;
  --text: #e6edf3;
  --text2: #7d8590;
  --accent: #2d7d7d;
  --accent2: #1f5c5c;
  --border: #2a2f3a;
  --error-bg: rgba(192,57,43,0.1);
  --error-border: rgba(192,57,43,0.3);
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* Background subtle grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(45,125,125,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(45,125,125,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.login-wrap {
  width: 100%;
  max-width: 400px;
  position: relative;
  z-index: 1;
}

/* Top label */
.login-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.login-label::before {
  content: '';
  width: 20px;
  height: 1px;
  background: var(--accent);
}

.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

.login-header {
  margin-bottom: 28px;
}

.login-avatar {
  width: 44px;
  height: 44px;
  background: var(--accent);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 0.8rem;
  font-weight: 700;
  color: white;
  margin-bottom: 16px;
  letter-spacing: 0.5px;
}

.login-title {
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
  margin-bottom: 6px;
}

.login-sub {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--text2);
}

.login-sub span {
  color: var(--accent);
}

.error-msg {
  background: var(--error-bg);
  border: 1px solid var(--error-border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 0.8rem;
  color: #e74c3c;
  margin-bottom: 20px;
  display: none;
  font-family: var(--mono);
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
  display: block;
}

.form-input {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.88rem;
  color: var(--text);
  background: var(--card2);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  font-family: var(--sans);
}

.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(45,125,125,0.15);
}

.form-input::placeholder {
  color: var(--text2);
  opacity: 0.6;
}

.login-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.15s, transform 0.1s;
  font-family: var(--sans);
  letter-spacing: 0.2px;
}

.login-btn:hover { background: var(--accent2); }
.login-btn:active { transform: scale(0.99); }

.demo-hint {
  margin-top: 20px;
  padding: 12px 14px;
  background: rgba(45,125,125,0.08);
  border: 1px solid rgba(45,125,125,0.2);
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text2);
  line-height: 1.8;
}

.demo-hint span {
  color: var(--accent);
}

.footer-note {
  text-align: center;
  margin-top: 20px;
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--text2);
  opacity: 0.6;
}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-label">Raspberry Pi Dashboard</div>

  <div class="login-card">
    <div class="login-header">
      <div class="login-avatar">AE</div>
      <div class="login-title">Ayman El-Toufaili</div>
      <div class="login-sub">IT-Systemelektroniker &nbsp;·&nbsp; <span>Portfolio</span></div>
    </div>

    <div class="error-msg" id="error">Ungültige Zugangsdaten. Bitte erneut versuchen.</div>

    <div class="form-group">
      <label class="form-label">Benutzername</label>
      <input class="form-input" type="text" id="username" placeholder="demo" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Passwort</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="login-btn" onclick="login()">Einloggen</button>

    <div class="demo-hint">
      Demo-Zugang &nbsp;·&nbsp; <span>demo</span> / <span>demo2026</span>
    </div>
  </div>

  <div class="footer-note">Raspberry Pi 4 · Marl, NRW</div>
</div>

<script>
async function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const error = document.getElementById("error");
  error.style.display = "none";
  try {
    const res = await fetch("/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok && data.token) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("user", data.user);
      window.location.href = "/";
    } else {
      error.style.display = "block";
    }
  } catch {
    error.style.display = "block";
  }
}

document.addEventListener("DOMContentLoaded", () => {
  if (localStorage.getItem("token")) {
    window.location.href = "/";
  }
  document.addEventListener("keypress", e => {
    if (e.key === "Enter") login();
  });
});
</script>
</body>
</html>
